<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="{%url 'thanks_page'%}" method="POST">
        {%csrf_token%}
        <label>Имя</label>
        <input name="name">
        <label>Телефон</label>
        <input name="phone">
        <button type="submit">ОТПРАВИТЬ</button>
    </form>

{%if object_list%}
    <table border="1">
        <tr>
            <th>Id</th>
            <th>date</th>
            <th>name</th>
            <th>phone</th>
        </tr>
        {%for obj in object_list %}
        <tr> 
            <th>{{obj.id}}</th>
            <th>{{obj.order_dt}}</th>
            <th>{{obj.order_name}}</th>
            <th>{{obj.order_phone}}</th>
        </tr>
        {%endfor%}
    </table>
{%else%}
нет данных
{%endif%}
</body>
</html>
